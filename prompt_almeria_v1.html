<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT ALMERÍA - Portal Maestro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00c1;
            --neon-purple: #bc13fe;
            --neon-grad: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            --bg-dark: #0a0a0c;
            --bg-card: rgba(20, 20, 25, 0.8);
            --text-main: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Ocultar barra de scroll globalmente */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        /* Asegurar que contenedores específicos no tengan scroll visible */
        .sidebar, .content-area, .prompts-grid, #presets-list, #categories-nav {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .sidebar::-webkit-scrollbar, .content-area::-webkit-scrollbar, .prompts-grid::-webkit-scrollbar, #presets-list::-webkit-scrollbar, #categories-nav::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 193, 0.05) 0%, transparent 40%);
        }


        main {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--glass);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 20px;
            height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
        }

        .sidebar h2, .sidebar-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--glass);
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        #categories-nav {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 10px;
        }

        .nav-btn {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: var(--glass);
            border: 1px solid transparent;
            color: var(--text-main);
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        .nav-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon-blue);
            transform: translateX(5px);
        }
        .nav-btn.active {
            background: linear-gradient(90deg, var(--neon-blue), transparent);
            border-left: 4px solid var(--neon-blue);
            font-weight: 700;
        }

        /* Preset Manager Styles */
        .presets-section {
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass);
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .presets-section h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--neon-pink);
            margin-bottom: 15px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preset-input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .preset-input-group input {
            flex: 1;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass);
            color: white;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .save-preset-btn {
            padding: 8px 12px;
            background: var(--neon-blue);
            border: none;
            color: black;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .save-preset-btn:hover {
            box-shadow: 0 0 10px var(--neon-blue);
            transform: scale(1.05);
        }

        #presets-list {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }

        .preset-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-item:hover {
            background: rgba(0, 242, 255, 0.05);
            border-color: rgba(0, 242, 255, 0.3);
        }

        .preset-name {
            font-size: 0.85rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .preset-actions {
            display: flex;
            gap: 8px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .preset-item:hover .preset-actions {
            opacity: 1;
        }

        .preset-action-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px;
            transition: color 0.2s;
        }

        .btn-edit:hover { color: var(--neon-blue); }
        .btn-delete:hover { color: var(--neon-pink); }

        .presets-footer {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--glass);
        }

        .btn-preset-io {
            flex: 1;
            padding: 6px;
            background: var(--glass);
            border: 1px solid var(--glass);
            color: var(--text-main);
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 700;
        }

        .btn-preset-io:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }

        /* Variables Panel */
        .variables-panel {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--neon-pink);
            box-shadow: inset 0 0 15px rgba(255, 0, 193, 0.1);
        }
        .variables-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            align-items: end;
        }

        /* Configuración para 4 filas equilibradas (Total 20 columnas) */
        .row-1-item { grid-column: span 4; } /* 5 elementos * 4 = 20 */
        .row-2-item { grid-column: span 4; } /* 5 elementos * 4 = 20 */
        .row-3-item { grid-column: span 5; } /* 4 elementos * 5 = 20 */
        .row-4-item { grid-column: span 10; } /* 2 elementos * 10 = 20 */

        .variable-item label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            color: var(--neon-pink);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .variable-item select, .variable-item input {
            width: 100%;
            padding: 8px;
            background: #1a1a20;
            border: 1px solid var(--glass);
            color: white;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .variable-item select:focus {
            border-color: var(--neon-blue);
        }

        .variable-item select:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .random-btn-container {
            display: flex;
            align-items: flex-end;
            height: 100%;
        }

        .random-btn {
            width: 100%;
            padding: 10px;
            background: var(--neon-grad);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.4);
        }

        /* Content Area */
        .content-area {
            display: flex;
            flex-direction: column;
        }

        .category-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category-title span {
            font-size: 0.9rem;
            background: var(--neon-blue);
            color: black;
            padding: 2px 10px;
            border-radius: 3px;
        }

        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .prompt-card {
            background: var(--bg-card);
            border-radius: 15px;
            border: 1px solid var(--glass);
            padding: 20px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .prompt-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-blue);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.15);
        }

        .prompt-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: var(--neon-blue);
            opacity: 0.5;
            }

        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .prompt-id {
            font-size: 0.8rem;
            color: var(--neon-blue);
            font-weight: 700;
        }

        .prompt-style {
            font-size: 0.7rem;
            background: rgba(188, 19, 254, 0.2);
            color: var(--neon-purple);
            padding: 2px 8px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .prompt-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: white;
            line-height: 1.2;
        }

        .prompt-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #b0b0b0;
            flex-grow: 1;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prompt-actions {
            display: flex;
            gap: 10px;
        }

        .btn-copy {
            flex-grow: 1;
            padding: 10px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-copy:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .btn-copy:active {
            transform: scale(0.95);
        }

        /* Modal / Feedback */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            background: var(--neon-blue);
            color: black;
            border-radius: 50px;
            font-weight: 700;
            transform: translateY(100px);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        #toast.show {
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: relative;
                top: 0;
            }
        }
        .btn-random {
            background: var(--neon-grad);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            height: 42px;
            align-self: flex-end;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-random:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.5);
            filter: brightness(1.2);
        }

        .btn-random svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Signature Pad Styles */
        .signature-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--bg-dark);
            border: 2px solid var(--neon-blue);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
            z-index: 2000;
            display: none;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .signature-container.show {
            display: flex;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        #signature-pad {
            background: white;
            border-radius: 8px;
            cursor: crosshair;
            touch-action: none;
        }

        .signature-footer {
            display: flex;
            gap: 10px;
        }

        .btn-sig {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-sig-clear { background: #333; color: white; }
        .btn-sig-save { background: var(--neon-blue); color: black; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1500;
            display: none;
        }
        
        .signature-preview {
            width: 100px;
            height: 40px;
            background: white;
            border-radius: 4px;
            margin-top: 5px;
            display: none;
            object-fit: contain;
            border: 1px solid var(--neon-blue);
        }
    </style>
</head>
<body>


    <main>
        <aside class="sidebar">
            <div class="presets-section">
                <div class="presets-header" style="margin-bottom: 15px; color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 1px;">
                    <span>📁 MIS PRESETS</span>
                </div>
                <div class="preset-save-container" style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <input type="text" id="preset-name" placeholder="Nombre preset..." style="flex:1; padding:8px; background:rgba(0,0,0,0.3); border:1px solid var(--glass); color:white; border-radius:4px; font-size:0.8rem;">
                    <button class="save-preset-btn" onclick="saveCurrentAsPreset()" title="Guardar actual" style="padding: 8px 12px; background: var(--neon-blue); border: none; color: black; border-radius: 4px; cursor: pointer; font-weight: 700;">💾</button>
                </div>
                <div id="presets-list">
                    <!-- Presets se cargarán aquí -->
                </div>
                <div class="presets-footer" style="margin-top: 15px; display: flex; gap: 10px; padding-top: 10px; border-top: 1px solid var(--glass);">
                    <button class="btn-preset-io" onclick="exportPresets()">📤 Exportar</button>
                    <button class="btn-preset-io" onclick="importPresets()">📥 Importar</button>
                </div>
            </div>

            <div class="sidebar-header">Categorías</div>
            
            <div id="categories-nav">
                <!-- Botones de categoría se cargarán aquí -->
            </div>
        </aside>

        <section class="content-area">
            <div class="variables-panel">
                <div class="variables-grid">
                    <!-- Fila 1 (4 items) -->
                    <div class="variable-item row-1-item">
                        <label>Rostro de Referencia</label>
                        <select id="var-face" onchange="toggleManual(); updateView()">
                            <option value="un hombre con rostro subido como referencia">Por defecto (Hombre)</option>
                            <option value="una mujer con rostro subido como referencia">Referencia Mujer</option>
                            <option value="un anciano con rostro subido como referencia">Referencia Anciano</option>
                            <option value="un niño con rostro subido como referencia">Referencia Niño</option>
                            <option value="MANUAL">Manual (Insertar URL/Texto)</option>
                        </select>
                        <input type="text" id="var-face-manual" placeholder="URL o texto..." style="display:none; margin-top:5px; padding:5px; width:100%; font-size: 0.7rem;" oninput="updateView()">
                    </div>
                    <div class="variable-item row-1-item">
                        <label>Iluminación</label>
                        <select id="var-light" onchange="updateView()">
                            <option value="">(Mantener original)</option>
                            <optgroup label="🎬 Cine y Fotografía">
                                <option value="iluminación de Anillo de Luz Anamórfico (Anamorphic Ring)">Anillo Anamórfico</option>
                                <option value="iluminación de Contraluz Cinematográfico (Cinematic Backlight)">Contraluz Cine</option>
                                <option value="iluminación de Escenario (Stage spotlight)">Escenario</option>
                                <option value="iluminación de Terror (Spooky / Dutch angle light)">Terror</option>
                                <option value="iluminación Dramática (High contrast drama)">Dramática</option>
                                <option value="iluminación Film Noir (Hard shadows / Chiaroscuro)">Film Noir</option>
                                <option value="iluminación Rembrandt (Classic portrait light)">Rembrandt</option>
                                <option value="iluminación Volumétrica (God rays)">Volumétrica</option>
                                <option value="iluminación de Estudio Profesional (3-point light)">Estudio Pro</option>
                                <option value="iluminación de Interrogatorio (Harsh top light)">Interrogatorio</option>
                                <option value="iluminación de Proyector de Cine (Beam light)">Proyector Cine</option>
                                <option value="iluminación de Silueta (Backlit silhouette)">Silueta</option>
                            </optgroup>
                            <optgroup label="☀️ Natural y Atmósfera">
                                <option value="iluminación de Día Nublado (Soft overcast)">Día Nublado</option>
                                <option value="iluminación de Hora Azul (Blue hour dusk)">Hora Azul</option>
                                <option value="iluminación de Hora Dorada (Golden hour sunset)">Hora Dorada</option>
                                <option value="iluminación de Aurora Boreal (Northern lights)">Aurora Boreal</option>
                                <option value="iluminación de Eclipse (Solar eclipse light)">Eclipse</option>
                                <option value="iluminación de Luz de Luna (Moonlight glow)">Luz de Luna</option>
                                <option value="iluminación de Luz de Relámpago (Lightning flash)">Relámpago</option>
                                <option value="iluminación de Luz de Ventana (Window light)">Luz de Ventana</option>
                                <option value="iluminación de Luz entre Follaje (Dappled light)">Entre Follaje</option>
                                <option value="iluminación de Luz Estelar (Starlight / Milky way)">Luz Estelar</option>
                                <option value="iluminación Subacuática (Underwater caustics)">Subacuática</option>
                                <option value="iluminación de Niebla Iluminada (Glowy fog)">Niebla Iluminada</option>
                                <option value="iluminación de Sol Cenital (Noon high sun)">Sol Cenital</option>
                            </optgroup>
                            <optgroup label="🌆 Urbano y Artificial">
                                <option value="iluminación de Farolas de Calle (Street lamps)">Farolas de Calle</option>
                                <option value="iluminación de Semáforo (Traffic light glow)">Semáforo</option>
                                <option value="iluminación de Neón Urbano (Urban Neon)">Neón Urbano</option>
                                <option value="iluminación en Asfalto Mojado (Wet pavement reflections)">Reflejos Asfalto</option>
                            </optgroup>
                            <optgroup label="🔮 Fantasía y Magia">
                                <option value="iluminación de Aura Mágica (Magic aura glow)">Aura Mágica</option>
                                <option value="iluminación de Brillo de Cristal (Crystal refraction)">Brillo de Cristal</option>
                                <option value="iluminación de Brillo Etéreo (Ethereal celestial)">Brillo Etéreo</option>
                                <option value="iluminación de Portal (Spacetime rift light)">Luz de Portal</option>
                            </optgroup>
                            <optgroup label="🚀 Tecnología y Sci-Fi">
                                <option value="iluminación de Energía de Plasma (Plasma crackle)">Plasma</option>
                                <option value="iluminación de Fibras Ópticas (Fiber optic glow)">Fibras Ópticas</option>
                                <option value="iluminación de Láseres (Laser beams)">Láseres</option>
                                <option value="iluminación de Agujero Negro (Accretion disk)">Agujero Negro</option>
                                <option value="iluminación de Laboratorio (Fluorescent lab)">Laboratorio</option>
                                <option value="iluminación de Pantalla (Screen glow)">Luz de Pantalla</option>
                                <option value="iluminación de Propulsores (Thrusters glow)">Propulsores</option>
                                <option value="iluminación de Luz Térmica (Thermal heat map)">Térmica</option>
                                <option value="iluminación de Luz Ultravioleta (UV / Blacklight)">Ultravioleta</option>
                                <option value="iluminación de Luz Negra (Fluorescent blacklight)">Luz Negra</option>
                            </optgroup>
                            <optgroup label="🔥 Fuego e Industrial">
                                <option value="iluminación de Fuego de Hoguera (Campfire glow)">Hoguera</option>
                                <option value="iluminación de Luz de Explosión (Blast flash)">Explosión</option>
                                <option value="iluminación de Fuego de Soldadura (Welding sparks)">Soldadura</option>
                                <option value="iluminación de Luz de Velas (Candlelight)">Velas</option>
                                <option value="iluminación de Linterna (Flashlight beam)">Linterna</option>
                            </optgroup>
                            <optgroup label="🌈 Efectos Ópticos">
                                <option value="iluminación de Arcoíris (Rainbow spectrum)">Arcoíris</option>
                                <option value="iluminación de Ojo de Cerradura (Keyhole light)">Ojo de Cerradura</option>

    <script src="data_prompts.js"></script>
    <script>
        const container = document.getElementById('prompts-container');
        const nav = document.getElementById('categories-nav');
        const title = document.getElementById('current-category');
        const count = document.getElementById('prompt-count');
        const toast = document.getElementById('toast');

        let currentCat = '';

        function init() {
            Object.keys(PROMPT_DATABASE).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = cat;
                btn.onclick = () => selectCategory(cat, btn);
                nav.appendChild(btn);
            });

            const firstCat = Object.keys(PROMPT_DATABASE)[0];
            if (firstCat) {
                selectCategory(firstCat, nav.querySelector('.nav-btn'));
            }
        }

        function selectCategory(catName, btn) {
            currentCat = catName;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            title.innerHTML = `${catName} <span id="prompt-count">${PROMPT_DATABASE[catName].length}</span>`;
            renderPrompts(PROMPT_DATABASE[catName]);
        }

        function renderPrompts(prompts) {
            container.innerHTML = '';
            prompts.forEach(p => {
                const cleanTitle = p.title.includes('/') ? p.title.split('/').pop().trim().toUpperCase() : p.title.toUpperCase();
                const card = document.createElement('div');
                card.className = 'prompt-card';
                card.id = `card-${p.id}`;
                card.innerHTML = `
                    <div class="prompt-header">
                        <span class="prompt-id">#${p.number}</span>
                        <span class="prompt-style">${p.style}</span>
                    </div>
                    <div class="prompt-title">${cleanTitle}</div>
                    <div class="prompt-text" data-base="${p.content.replace(/"/g, '&quot;')}" id="text-${p.id}">${getProcessedText(p.content)}</div>
                    <div class="prompt-actions">
                        <button class="btn-copy" onclick="copyPrompt('${p.id}')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                            Copiar Prompt
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleManual() {
            const select = document.getElementById('var-face');
            const manual = document.getElementById('var-face-manual');
            manual.style.display = select.value === 'MANUAL' ? 'block' : 'none';
        }

        function toggleManualClothing() {
            const select = document.getElementById('var-clothing');
            const manual = document.getElementById('var-clothing-manual');
            manual.style.display = select.value === 'MANUAL' ? 'block' : 'none';
            if (select.value === 'MANUAL') manual.focus();
        }

        function getProcessedText(baseText) {
            let text = baseText;
            const faceSelect = document.getElementById('var-face');
            const faceManual = document.getElementById('var-face-manual');
            let faceReplacer = faceSelect.value;
            
            if (faceReplacer === 'MANUAL') {
                faceReplacer = faceManual.value || '[INTRODUCIR URL/TEXTO]';
            }

            // Fix for recursive replacement & duplication
            const clothingSelect = document.getElementById('var-clothing');
            const clothingManual = document.getElementById('var-clothing-manual');
            let clothingReplacer = clothingSelect.value;
            if (clothingReplacer === 'MANUAL') {
                clothingReplacer = clothingManual.value ? `vistiendo ${clothingManual.value}` : '[ESCRIBIR VESTIMENTA]';
            }

            const facePatterns = [
                /un hombre con rostro subido como referencia/gi,
                /una mujer con rostro subido como referencia/gi,
                /un anciano con rostro subido como referencia/gi,
                /un niño con rostro subido como referencia/gi,
                /rostro subido como referencia/gi
            ];
            
            for (let pattern of facePatterns) {
                if (pattern.test(text)) {
                    text = text.replace(pattern, faceReplacer);
                    break;
                }
            }

            // Inyectar Estilo, Movimiento, Dibujo, Lente, DOF y Plano
            const styleMaster = document.getElementById('var-style-master').value;
            const colorPalette = document.getElementById('var-color').value;
            const drawStyle = document.getElementById('var-draw-style').value;
            const lens = document.getElementById('var-lens').value;
            const dof = document.getElementById('var-dof').value;
            const shot = document.getElementById('var-shot').value;
            const effect = document.getElementById('var-effect').value;
            const clothing = document.getElementById('var-clothing').value;
            
            let prefix = "";
            if (styleMaster) prefix += styleMaster + ", ";
            if (colorPalette) prefix += colorPalette + ", ";
            if (drawStyle) prefix += drawStyle + ", ";
            if (clothingReplacer) prefix += clothingReplacer + ", ";
            if (lens) prefix += lens + ", ";
            if (dof) prefix += dof + ", ";
            if (shot) prefix += shot + ", ";
            if (effect) prefix += effect + ", ";
            
            if (prefix) {
                text = prefix + text;
            }

            const light = document.getElementById('var-light').value;
            const quality = document.getElementById('var-quality').value;

            if (light) {
                if (text.toLowerCase().includes('iluminación')) {
                    text = text.replace(/iluminación[^,.]*/gi, light);
                } else if (text.toLowerCase().includes('ilumina')) {
                    text = text.replace(/ilumina[^,.]*/gi, light);
                } else {
                    text += `. Con ${light}`;
                }
            }

            const surface = document.getElementById('var-surface').value;

            if (quality) {
                if (text.includes('8K')) {
                    text = text.replace(/nitidez 8K absoluta[^,.]*/gi, quality);
                    text = text.replace(/realismo[^,.]*8K/gi, quality);
                } else {
                    text += `. Calidad técnica: ${quality}`;
                }
            }

            if (surface) {
                text += `. Representado ${surface}`;
            }

            const cinema = document.getElementById('var-cinema').value;
            const aspect = document.getElementById('var-ar').value;

            if (cinema === 'ON') {
                text += ", cinematic lighting, anamorphic lens, movie scene, shot on 35mm, high contrast";
            }

            if (aspect) {
                text += ` ${aspect}`;
            }

            const signatureText = document.getElementById('var-signature').value.trim();
            if (signatureText) {
                text += `. Included a small, discrete handwritten artist signature in the bottom corner that reads "${signatureText}", elegant script style, cursive ink strokes, authentic feel.`;
            }

            const signatureImg = localStorage.getItem('prompt_almeria_signature');
            if (signatureImg && signatureImg !== 'null') {
                text += ` [Hand-drawn signature enabled: authentic biometric stroke verification]`;
            }

            return text;
        }

        // --- FIRMA A MANO ALZADA ---
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function openSignaturePad() {
            document.querySelector('.overlay').style.display = 'block';
            document.querySelector('.signature-container').classList.add('show');
            resizeCanvas();
            loadSavedSignature();
        }

        function closeSignaturePad() {
            document.querySelector('.overlay').style.display = 'none';
            document.querySelector('.signature-container').classList.remove('show');
        }

        function resizeCanvas() {
            canvas.width = 400;
            canvas.height = 200;
            ctx.strokeStyle = "black";
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
        }

        function startDrawing(e) {
            drawing = true;
            draw(e);
        }

        function stopDrawing() {
            drawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        canvas.addEventListener('touchend', stopDrawing);

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            localStorage.removeItem('prompt_almeria_signature');
            document.getElementById('sig-preview').style.display = 'none';
            updateView();
        }

        function saveSignature() {
            const dataUrl = canvas.toDataURL();
            localStorage.setItem('prompt_almeria_signature', dataUrl);
            document.getElementById('sig-preview').src = dataUrl;
            document.getElementById('sig-preview').style.display = 'block';
            closeSignaturePad();
            showToast("Firma guardada correctamente");
            updateView();
        }

        function loadSavedSignature() {
            const saved = localStorage.getItem('prompt_almeria_signature');
            if (saved && saved !== 'null') {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = saved;
                document.getElementById('sig-preview').src = saved;
                document.getElementById('sig-preview').style.display = 'block';
            }
        }

        function updateView() {
            const texts = document.querySelectorAll('.prompt-text');
            texts.forEach(el => {
                const baseText = el.getAttribute('data-base').replace(/&quot;/g, '"');
                el.innerText = getProcessedText(baseText);
            });
        }

        function setRandom() {
            const selects = ['var-face', 'var-light', 'var-quality', 'var-cinema', 'var-surface', 'var-ar', 'var-style-master', 'var-color', 'var-draw-style', 'var-lens', 'var-dof', 'var-shot', 'var-effect', 'var-clothing'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    const options = Array.from(el.querySelectorAll('option')).filter(o => o.value !== "");
                    if (options.length > 0) {
                        const randomIndex = Math.floor(Math.random() * options.length);
                        el.value = options[randomIndex].value;
                    }
                }
            });
            updateView();
            
            const btn = document.querySelector('.random-btn');
            btn.style.filter = 'hue-rotate(90deg)';
            setTimeout(() => btn.style.filter = '', 300);
        }

        function copyPrompt(id) {
            const el = document.getElementById(`text-${id}`);
            const textToCopy = el.innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast(`Prompt #${id.split('_').pop()} Copiado`);
            });
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // --- GESTIÓN DE PRESETS (localStorage) ---
        const PRESETS_KEY = 'prompt_almeria_presets';

        function saveCurrentAsPreset() {
            const nameInput = document.getElementById('preset-name');
            const name = nameInput.value.trim();
            if (!name) {
                alert("Por favor, introduce un nombre para el preset.");
                return;
            }

            const currentConfig = {
                name: name,
                variables: {
                    'var-face': document.getElementById('var-face').value,
                    'var-light': document.getElementById('var-light').value,
                    'var-quality': document.getElementById('var-quality').value,
                    'var-cinema': document.getElementById('var-cinema').value,
                    'var-ar': document.getElementById('var-ar').value,
                    'var-style-master': document.getElementById('var-style-master').value,
                    'var-draw-style': document.getElementById('var-draw-style').value,
                    'var-lens': document.getElementById('var-lens').value,
                    'var-dof': document.getElementById('var-dof').value,
                    'var-shot': document.getElementById('var-shot').value,
                    'var-effect': document.getElementById('var-effect').value,
                    'var-clothing': document.getElementById('var-clothing').value,
                    'var-surface': document.getElementById('var-surface').value,
                    'var-color': document.getElementById('var-color').value,
                    'var-signature': document.getElementById('var-signature').value
                }
            };

            let presets = JSON.parse(localStorage.getItem(PRESETS_KEY) || '[]');
            const existingIndex = presets.findIndex(p => p.name === name);
            if (existingIndex !== -1) {
                if (!confirm(`El preset "${name}" ya existe. ¿Deseas sobrescribirlo?`)) return;
                presets[existingIndex] = currentConfig;
            } else {
                presets.push(currentConfig);
            }

            localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
            nameInput.value = '';
            renderPresetsList();
        }

        function loadPreset(index) {
            const presets = JSON.parse(localStorage.getItem(PRESETS_KEY) || '[]');
            const preset = presets[index];
            if (!preset) return;

            Object.keys(preset.variables).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.value = preset.variables[id] || "";
                    if (id === 'var-face') {
                        const manual = document.getElementById('var-face-manual');
                        if (manual) manual.style.display = el.value === 'MANUAL' ? 'block' : 'none';
                    }
                }
            });

            updateView();
        }

        function deletePreset(index, event) {
            event.stopPropagation();
            const presets = JSON.parse(localStorage.getItem(PRESETS_KEY) || '[]');
            if (!confirm(`¿Seguro que quieres eliminar el preset "${presets[index].name}"?`)) return;
            
            presets.splice(index, 1);
            localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
            renderPresetsList();
        }

        function renamePreset(index, event) {
            event.stopPropagation();
            const presets = JSON.parse(localStorage.getItem(PRESETS_KEY) || '[]');
            const oldName = presets[index].name;
            const newName = prompt(`Nuevo nombre para "${oldName}":`, oldName);
            
            if (newName && newName.trim() !== "" && newName !== oldName) {
                presets[index].name = newName.trim();
                localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
                renderPresetsList();
            }
        }

        function renderPresetsList() {
            const list = document.getElementById('presets-list');
            if (!list) return;
            const presets = JSON.parse(localStorage.getItem(PRESETS_KEY) || '[]');
            
            if (presets.length === 0) {
                list.innerHTML = '<div style="font-size:0.7rem; opacity:0.5; padding:10px;">No hay presets guardados.</div>';
                return;
            }

            list.innerHTML = presets.map((p, i) => `
                <div class="preset-item" onclick="loadPreset(${i})">
                    <span class="preset-name" title="${p.name}">${p.name}</span>
                    <div class="preset-actions">
                        <button class="preset-action-btn btn-edit" onclick="renamePreset(${i}, event)" title="Renombrar">✏️</button>
                        <button class="preset-action-btn btn-delete" onclick="deletePreset(${i}, event)" title="Eliminar">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        async function exportPresets() {
            const presets = localStorage.getItem(PRESETS_KEY);
            if (!presets || presets === '[]') {
                alert("No hay presets para exportar.");
                return;
            }

            // Intentar usar la File System Access API (Chrome/Edge) para elegir destino exacto
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'presets_almeria.json',
                        types: [{
                            description: 'JSON Presets',
                            accept: { 'application/json': ['.json'] },
                        }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(presets);
                    await writable.close();
                    showToast("Guardado con éxito en la carpeta");
                    return;
                } catch (err) {
                    console.log("Cancelado o no soportado, usando descarga estándar.");
                }
            }

            // Fallback: descarga estándar
            const blob = new Blob([presets], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'presets_almeria.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast("Descargado (muévelo a la carpeta del HTML)");
        }

        function importPresets() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (!Array.isArray(imported)) throw new Error("Formato inválido");

                        const current = JSON.parse(localStorage.getItem(PRESETS_KEY) || '[]');
                        
                        if (confirm(`Se han encontrado ${imported.length} presets. ¿Deseas UNIRLOS a los actuales? (Aceptar) o REEMPLAZARLOS por completo (Cancelar)?`)) {
                            // Merge: evitar duplicados por nombre
                            const merged = [...current];
                            imported.forEach(p => {
                                const idx = merged.findIndex(m => m.name === p.name);
                                if (idx === -1) merged.push(p);
                                else merged[idx] = p; // Sobrescribir si existe
                            });
                            localStorage.setItem(PRESETS_KEY, JSON.stringify(merged));
                        } else {
                            if (confirm("Se perderán todos los presets actuales. ¿Continuar?")) {
                                localStorage.setItem(PRESETS_KEY, JSON.stringify(imported));
                            }
                        }
                        
                        renderPresetsList();
                        showToast("Presets importados con éxito");
                    } catch (err) {
                        alert("Error al importar: El archivo no es un preset válido.");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        init();
        renderPresetsList();
    </script>
</body>
</html>
