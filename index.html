    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <main>

            <div class="presets-section">
                <div class="presets-header" style="margin-bottom: 15px; color: var(--neon-pink); font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 1px;">
                    <span>📁 MIS PRESETS</span>
                </div>
                <div class="preset-save-container" style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <input type="text" id="preset-name" placeholder="Nombre preset..." style="flex:1; padding:8px; background:rgba(0,0,0,0.3); border:1px solid var(--glass); color:white; border-radius:4px; font-size:0.8rem;">
                    <button id="btn-save-preset" class="save-preset-btn" title="Guardar actual" style="padding: 8px 12px; background: var(--neon-blue); border: none; color: black; border-radius: 4px; cursor: pointer; font-weight: 700;">💾</button>
                </div>
                <div id="presets-list">
                    <!-- Presets se cargarán aquí -->
                </div>
                <div class="presets-footer" style="margin-top: 15px; display: flex; gap: 10px; padding-top: 10px; border-top: 1px solid var(--glass);">
                    <button id="btn-export-presets" class="btn-preset-io">📤 Exportar</button>
                    <button id="btn-import-presets" class="btn-preset-io">📥 Importar</button>
                </div>
            </div>

            <div class="sidebar-header">PORTAL MAESTRO</div>
            
            <div class="search-container">
                <input type="text" id="search-input-sidebar" class="search-input" placeholder="Buscar prompts...">
                <span class="search-icon" id="search-icon">🔍</span>
                <button class="clear-search" id="clear-search">×</button>
            </div>

            <div id="categories-nav">
                <!-- Botones de categoría se cargarán aquí -->
            </div>
        </aside>
